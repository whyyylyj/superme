# GitHub Pages Deploy Workflow
# SUPERME 一键部署到 GitHub Pages
#
# 触发条件：每次推送到 main 分支时自动部署
# 部署目标：https://whyyylyj.github.io/superme/
#
# 使用方法：
#   1. 推送到 main 分支自动部署
#   2. 或在 GitHub Actions 页面手动触发 "Deploy to GitHub Pages"

name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch: # 允许手动触发部署

# 设置权限以允许向 gh-pages 分支推送
permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. 检出代码
      - name: Checkout
        uses: actions/checkout@v4

      # 2. 准备部署文件
      - name: Prepare deployment files
        run: |
          echo "📦 准备部署文件..."
          mkdir -p ./_site
          cp -r index.html css/ js/ ./_site/ 2>/dev/null || true
          cp README.md ./_site/ 2>/dev/null || true
          cp -r docs/ ./_site/ 2>/dev/null || true
          echo "✅ 部署文件准备完成"
          ls -la ./_site/

      # 3. 部署到 gh-pages 分支
      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          create_nojekyll: true
          force_orphan: true
          commit_message: "🚀 Deploy to GitHub Pages: ${{ github.sha }}"
