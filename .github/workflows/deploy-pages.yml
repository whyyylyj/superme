# GitHub Pages Deploy Workflow
# 使用 gh-pages 分支部署（更简单，不需要手动启用 Pages）
# 
# 触发条件：每次推送到 main 分支时自动部署
# 部署目标：https://whyyylyj.github.io/superme/

name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch: # 允许手动触发部署

# 设置权限以允许向 gh-pages 分支推送
permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      # 1. 检出代码
      - name: Checkout
        uses: actions/checkout@v4

      # 2. 准备部署文件
      - name: Prepare deployment files
        run: |
          mkdir -p ./_site
          cp index.html ./_site/
          mkdir -p ./_site/css
          cp css/*.css ./_site/css/
          mkdir -p ./_site/js
          cp -r js/* ./_site/js/
          cp README.md ./_site/ 2>/dev/null || true
          mkdir -p ./_site/docs
          cp docs/*.md ./_site/docs/ 2>/dev/null || true

      # 3. 部署到 gh-pages 分支
      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          # 创建 .nojekyll 文件，防止 Jekyll 处理 .md 等文件
          create_nojekyll: true
