<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>测试：飞行模式天花板碰撞修复</title>
    <style>
        body {
            margin: 0;
            background: #1a1a2e;
            color: #fff;
            font-family: monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        canvas {
            border: 2px solid #9932cc;
            background: #0a0a1a;
        }
        .info {
            margin-top: 10px;
            color: #aaa;
        }
        .status {
            margin-top: 10px;
            padding: 10px;
            background: #333;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <h1>🔧 飞行模式天花板碰撞修复测试</h1>
    <canvas id="gameCanvas" width="800" height="600"></canvas>
    <div class="info">
        <p>按 <strong>W/上箭头</strong> 向上飞，测试是否还会卡在天花板</p>
        <p>按 <strong>K/X</strong> 切换 Phantom 形态（飞行模式）</p>
    </div>
    <div class="status" id="status">
        状态：等待初始化...
    </div>

    <script src="js/physics.js"></script>
    <script src="js/input.js"></script>
    <script src="js/entity.js"></script>
    <script src="js/particle.js"></script>
    <script src="js/bullet.js"></script>
    <script src="js/powerup.js"></script>
    <script src="js/transform/form-normal.js"></script>
    <script src="js/transform/form-mecha.js"></script>
    <script src="js/transform/form-dragon.js"></script>
    <script src="js/transform/form-phantom.js"></script>
    <script src="js/transform/transform-system.js"></script>
    <script src="js/player.js"></script>
    
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const statusDiv = document.getElementById('status');

        // 初始化
        TransformSystem.init();
        const player = new Player(100, 300);
        
        // 创建测试平台（天花板）
        const platforms = [
            { x: 0, y: 500, width: 800, height: 100, draw: () => {} },  // 地面
            { x: 200, y: 200, width: 400, height: 20 },  // 天花板平台
        ];

        // 添加平台绘制方法
        platforms.forEach(p => {
            if (!p.draw) {
                p.draw = (ctx, camX, camY) => {
                    ctx.fillStyle = '#444';
                    ctx.fillRect(p.x - camX, p.y - camY, p.width, p.height);
                    ctx.strokeStyle = '#00ffcc';
                    ctx.strokeRect(p.x - camX, p.y - camY, p.width, p.height);
                };
            }
        });

        let lastTime = performance.now();
        
        function updateStatus() {
            statusDiv.innerHTML = `
                <div>形态：${TransformSystem.currentForm?.name || 'Normal'}</div>
                <div>位置：(${player.x.toFixed(1)}, ${player.y.toFixed(1)})</div>
                <div>速度：(${player.vx.toFixed(1)}, ${player.vy.toFixed(1)})</div>
                <div>hitCeiling: ${player.hitCeiling}</div>
                <div>ceilingPlatform: ${player.ceilingPlatform ? '存在' : '无'}</div>
                <div>canFly: ${TransformSystem.canFly()}</div>
            `;
        }

        function gameLoop(now) {
            const dt = (now - lastTime) / 1000;
            lastTime = now;

            // 清空
            ctx.fillStyle = '#0a0a1a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 绘制平台
            platforms.forEach(p => p.draw(ctx, 0, 0));

            // 更新
            player.update(dt, platforms, canvas.width);

            // 绘制玩家
            player.draw(ctx, 0, 0);

            // 更新状态
            updateStatus();

            requestAnimationFrame(gameLoop);
        }

        requestAnimationFrame(gameLoop);
    </script>
</body>
</html>
