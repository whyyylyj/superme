# GitHub Pages Deploy Workflow
# 自动部署到 GitHub Pages
# 
# 触发条件：每次推送到 main 分支时自动部署
# 部署目标：https://whyyylyj.github.io/superme/

name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch: # 允许手动触发部署

# 设置 GITHUB_TOKEN 权限
permissions:
  contents: read
  pages: write
  id-token: write

# 只允许一个部署任务同时运行
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    
    steps:
      # 1. 检出代码
      - name: Checkout
        uses: actions/checkout@v4

      # 2. 设置 Pages 环境
      - name: Setup Pages
        uses: actions/configure-pages@v5

      # 3. 准备部署文件（排除不必要的文件）
      - name: Prepare deployment files
        run: |
          # 创建部署目录
          mkdir -p ./_site
          
          # 复制必要的文件
          cp -r index.html css/ js/ ./_site/
          
          # 复制文档和 README（可选）
          cp README.md ./_site/ 2>/dev/null || true
          cp -r docs/ ./_site/ 2>/dev/null || true

      # 4. 上传构建产物
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # 只上传 _site 目录（不含 tests, node_modules 等）
          path: './_site'

      # 5. 部署到 GitHub Pages
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
